<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Seats | CineReserve</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#0a0a0a;
    color:white;
    text-align:center;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    padding:15px 5%;
}

.logo{
    color:#ffcc00;
    font-weight:600;
    text-decoration:none;
}

/* SCREEN DESIGN */
.screen-wrapper{
    margin:40px 0 30px 0;
}

.screen{
    width:400px;
    height:15px;
    background:#ffcc00;
    margin:auto;
    border-radius:10px;
    box-shadow:0 8px 30px rgba(255,204,0,0.6);
}

.screen-text{
    font-size:12px;
    color:#888;
    margin-top:8px;
}

/* SEATS GRID */
.seat-container{
    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:12px;
    max-width:350px;
    margin:30px auto;
}

.seat{
    width:35px;
    height:30px;
    background:#333;
    border-top-left-radius:8px;
    border-top-right-radius:8px;
    cursor:pointer;
}

.seat.selected{
    background:#ffcc00;
}

.seat.occupied{
    background:#111;
    cursor:not-allowed;
}

/* SUMMARY BOX */
.summary{
    margin-top:20px;
}

.btn-pay{
    margin-top:20px;
    padding:12px 25px;
    background:#ffcc00;
    border:none;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<a href="{% url 'dashboard' %}" class="logo">CINERESERVE</a>
<div>User: <b>{{ user.username }}</b></div>
</header>

<h2>Select Your Seats</h2>

<!-- 🎬 MOVIE SCREEN -->
<div class="screen-wrapper">
    <div class="screen"></div>
    <div class="screen-text">SCREEN THIS WAY</div>
</div>

<!-- SEATS -->
<div class="seat-container" id="seatContainer"></div>

<!-- SUMMARY -->
<div class="summary">
<p>Seats Selected: <span id="count">0</span></p>
<p>Total Price: ₹<span id="total">0</span></p>

<form action="{% url 'payment' %}" method="GET" onsubmit="return sendData()">
<input type="hidden" name="seats" id="seatsInput">
<input type="hidden" name="total" id="totalInput">
<button type="submit" class="btn-pay">Proceed to Pay</button>
</form>
</div>

<script>

const container=document.getElementById("seatContainer");
const count=document.getElementById("count");
const total=document.getElementById("total");

const ticketPrice=320;

/* CREATE SEATS */
for(let i=0;i<48;i++){

let seat=document.createElement("div");
seat.classList.add("seat");

if(Math.random()<0.2){
seat.classList.add("occupied");
}

seat.addEventListener("click",()=>{

if(!seat.classList.contains("occupied")){
seat.classList.toggle("selected");
updateBooking();
}

});

container.appendChild(seat);
}

function updateBooking(){

const selectedSeats=document.querySelectorAll(".seat.selected");
const selectedCount=selectedSeats.length;

count.innerText=selectedCount;
total.innerText=selectedCount*ticketPrice;

}

/* SEND DATA TO PAYMENT */
function sendData(){

const selectedSeats=document.querySelectorAll(".seat.selected");
const selectedCount=selectedSeats.length;
const totalPrice=selectedCount*ticketPrice;

if(selectedCount===0){
alert("Please select at least 1 seat");
return false;
}

document.getElementById("seatsInput").value=selectedCount;
document.getElementById("totalInput").value=totalPrice;

return true;

}

</script>

</body>
</html>
