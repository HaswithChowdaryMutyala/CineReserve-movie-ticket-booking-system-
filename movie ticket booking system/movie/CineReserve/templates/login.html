<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CineReserve</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: #0f0f0f; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
        }
        .login-card {
            background: rgba(15, 15, 15, 0.95); padding: 45px; border-radius: 12px;
            width: 100%; max-width: 380px; border-top: 5px solid #ffcc00;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); text-align: center;
        }
        .brand-name { color: #ffcc00; margin-bottom: 5px; font-size: 28px; font-weight: 600; letter-spacing: 1.5px; }
        p { color: #999; font-size: 14px; margin-bottom: 35px; }
        .form-group { text-align: left; margin-bottom: 22px; }
        label { color: #eee; font-size: 13px; display: block; margin-bottom: 8px; }
        input {
            width: 100%; padding: 14px; background: #252525; border: 1px solid #333;
            border-radius: 6px; color: white; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: #ffcc00; }
        .btn-login {
            width: 100%; padding: 14px; background: #ffcc00; border: none;
            border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 15px;
            transition: 0.3s;
        }
        .btn-login:hover { background: #e6b800; }
        .footer-link { color: #999; font-size: 14px; margin-top: 25px; }
        .footer-link a { color: #ffcc00; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-name">CINERESERVE</div>
        <p>Login to your account</p>
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">SIGN IN</button>
        </form>

        <div class="footer-link">
            Need an account? <a href="{% url 'signup' %}">Join CineReserve</a>
        </div>
    </div>
</body>
</html>
